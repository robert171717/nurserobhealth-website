<template id="main-graphics-template">
  <div
    data-composition-id="main-graphics"
    data-width="1920"
    data-height="1080"
    data-duration="60"
  >
    <!-- ===== SCENE 1: HOOK (0-12s) ===== -->
    <div id="scene-1" class="scene" style="opacity:1; z-index:10;">
      <div class="medical-badge">NURSE ROB · RN · PEPTIDE EDUCATION</div>
      <div class="hook-title">{{PEPTIDE_NAME}}</div>
      <div class="hook-subtitle">{{ONE_LINE_VALUE_PROP}}</div>
      <div class="red-accent-line"></div>
    </div>

    <!-- ===== SCENE 2: WHAT IS IT (12-24s) ===== -->
    <div id="scene-2" class="scene">
      <div class="scene2-grid">
        <div class="fact-card" id="fact-1">
          <div class="fact-number">{{FACT_1_NUMBER}}</div>
          <div class="fact-label">{{FACT_1_LABEL}}</div>
        </div>
        <div class="fact-card" id="fact-2">
          <div class="fact-icon">{{FACT_2_ICON}}</div>
          <div class="fact-label">{{FACT_2_LABEL}}</div>
        </div>
        <div class="fact-card" id="fact-3">
          <div class="fact-icon">{{FACT_3_ICON}}</div>
          <div class="fact-label">{{FACT_3_LABEL}}</div>
        </div>
      </div>
      <div class="scene-label">{{SCENE_2_TITLE}}</div>
      <div class="scene-subtitle">{{SCENE_2_SUBTITLE}}</div>
    </div>

    <!-- ===== SCENE 3: HOW IT WORKS (24-36s) ===== -->
    <div id="scene-3" class="scene">
      <div class="mechanism-container">
        <div class="mechanism-item" id="mech-1">
          <div class="mech-icon-container">
            <div class="mech-ring"></div>
            <div class="mech-pulse"></div>
          </div>
          <div class="mech-title">{{MECH_1_TITLE}}</div>
          <div class="mech-desc">{{MECH_1_DESC}}</div>
        </div>
        <div class="mechanism-item" id="mech-2">
          <div class="mech-icon-container">
            <div class="mech-dna"></div>
          </div>
          <div class="mech-title">{{MECH_2_TITLE}}</div>
          <div class="mech-desc">{{MECH_2_DESC}}</div>
        </div>
      </div>
      <div class="scene-label" style="margin-top:20px;">How It Works</div>
    </div>

    <!-- ===== SCENE 4: PROTOCOL (36-50s) ===== -->
    <div id="scene-4" class="scene">
      <div class="protocol-container">
        <div class="dose-display">
          <div class="dose-value">{{DOSE_RANGE}}</div>
          <div class="dose-unit">{{DOSE_UNIT}}</div>
          <div class="dose-label">{{DOSE_LABEL}}</div>
        </div>
        <div class="protocol-details">
          <div class="protocol-row" id="proto-1">
            <div class="proto-check">✓</div>
            <div class="proto-text">{{PROTO_1}}</div>
          </div>
          <div class="protocol-row" id="proto-2">
            <div class="proto-check">✓</div>
            <div class="proto-text">{{PROTO_2}}</div>
          </div>
          <div class="protocol-row" id="proto-3">
            <div class="proto-check">✓</div>
            <div class="proto-text">{{PROTO_3}}</div>
          </div>
        </div>
      </div>
      <div class="scene-label">{{SCENE_4_TITLE}}</div>
      <div class="disclaimer-text">*Individual protocols vary. Consult a healthcare provider.</div>
    </div>

    <!-- ===== SCENE 5: CTA (50-60s) ===== -->
    <div id="scene-5" class="scene">
      <div class="cta-container">
        <div class="cta-badge">Nurse Rob, RN</div>
        <div class="cta-title">{{CTA_HEADLINE}}</div>
        <div class="cta-action">{{CTA_ACTION}}</div>
        <div class="cta-url">@NurseRobHealth</div>
        <div class="cta-footer">cal.com/nurserob · $197 consult</div>
      </div>
    </div>

    <!-- ===== BRANDING BAR ===== -->
    <div id="branding-bar" class="branding-bar">
      <span>Nurse Rob, RN</span>
      <span class="branding-dot">·</span>
      <span>@NurseRobHealth</span>
    </div>

    <!-- ===== TRANSITION ===== -->
    <div id="fade-black" class="fade-overlay"></div>

    <style>
      [data-composition-id="main-graphics"] {
        background: #F7F9FC;
        font-family: "Inter", -apple-system, sans-serif;
        color: #1B2A4A;
        overflow: hidden;
      }
      .scene {
        position: absolute; top: 0; left: 0;
        width: 100%; height: 100%;
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        opacity: 0; z-index: 1;
      }
      .branding-bar {
        position: absolute; bottom: 30px; left: 50%;
        transform: translateX(-50%);
        font-size: 20px; font-weight: 600;
        color: #1B2A4A; opacity: 0.6;
        letter-spacing: 0.05em; z-index: 50;
        display: flex; gap: 8px;
      }
      .branding-dot { opacity: 0.4; }
      .medical-badge {
        position: absolute; top: 60px; left: 50%;
        transform: translateX(-50%);
        font-size: 18px; font-weight: 600;
        letter-spacing: 0.15em; color: #C0392B;
        opacity: 0;
      }
      #scene-1 { background: #F7F9FC; z-index: 10; opacity: 1; }
      .hook-title {
        font-family: "Playfair Display", serif;
        font-size: 180px; font-weight: 900;
        color: #1B2A4A; letter-spacing: -0.03em;
        transform: scale(0.3); opacity: 0;
      }
      .hook-subtitle {
        font-size: 36px; font-weight: 400;
        color: #5D6D7E; margin-top: 16px; opacity: 0;
      }
      .red-accent-line {
        width: 0; height: 4px; background: #C0392B;
        margin-top: 24px; border-radius: 2px;
      }
      .scene2-grid { display: flex; gap: 60px; margin-bottom: 40px; }
      .fact-card {
        width: 280px; height: 220px; background: #FFFFFF;
        border-radius: 16px; display: flex; flex-direction: column;
        justify-content: center; align-items: center; gap: 12px;
        box-shadow: 0 4px 24px rgba(27,42,74,0.06);
        opacity: 0; transform: translateY(40px);
      }
      .fact-number { font-size: 72px; font-weight: 900; color: #1B2A4A; }
      .fact-icon { font-size: 52px; }
      .fact-label { font-size: 22px; font-weight: 600; color: #5D6D7E; text-align: center; line-height: 1.3; }
      .scene-label { font-family: "Playfair Display", serif; font-size: 52px; font-weight: 900; color: #1B2A4A; opacity: 0; }
      .scene-subtitle { font-size: 22px; color: #5D6D7E; margin-top: 12px; max-width: 800px; text-align: center; line-height: 1.5; opacity: 0; }
      .mechanism-container { display: flex; gap: 80px; margin-bottom: 30px; }
      .mechanism-item { display: flex; flex-direction: column; align-items: center; gap: 16px; width: 500px; opacity: 0; transform: translateY(30px); }
      .mech-icon-container { width: 140px; height: 140px; position: relative; display: flex; justify-content: center; align-items: center; }
      .mech-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 3px solid #C0392B; opacity: 0.3; }
      .mech-pulse { width: 60px; height: 60px; background: #C0392B; border-radius: 50%; opacity: 0.15; transform: scale(0); }
      .mech-dna { width: 60px; height: 100px; background: linear-gradient(180deg, #1B2A4A 20%, #C0392B 50%, #1B2A4A 80%); border-radius: 30px; opacity: 0.8; }
      .mech-title { font-size: 30px; font-weight: 800; color: #1B2A4A; text-align: center; }
      .mech-desc { font-size: 18px; color: #5D6D7E; text-align: center; line-height: 1.5; }
      .protocol-container { display: flex; align-items: center; gap: 80px; margin-bottom: 30px; }
      .dose-display { text-align: center; }
      .dose-value { font-family: "Playfair Display", serif; font-size: 120px; font-weight: 900; color: #1B2A4A; opacity: 0; }
      .dose-unit { font-size: 36px; font-weight: 700; color: #C0392B; opacity: 0; }
      .dose-label { font-size: 20px; color: #5D6D7E; margin-top: 4px; opacity: 0; }
      .protocol-details { display: flex; flex-direction: column; gap: 20px; }
      .protocol-row { display: flex; align-items: center; gap: 16px; opacity: 0; transform: translateX(30px); }
      .proto-check { width: 40px; height: 40px; background: #1B2A4A; color: #FFFFFF; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; }
      .proto-text { font-size: 24px; font-weight: 500; color: #2C3E50; }
      .disclaimer-text { font-size: 14px; color: #7F8C8D; font-style: italic; margin-top: 16px; opacity: 0; }
      .cta-container { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 16px; }
      .cta-badge { font-size: 18px; font-weight: 700; color: #C0392B; letter-spacing: 0.15em; padding: 8px 24px; border: 2px solid #C0392B; border-radius: 30px; opacity: 0; }
      .cta-title { font-family: "Playfair Display", serif; font-size: 64px; font-weight: 900; color: #1B2A4A; line-height: 1.2; opacity: 0; }
      .cta-action { font-size: 40px; font-weight: 800; color: #C0392B; padding: 16px 48px; border: 3px solid #C0392B; border-radius: 12px; opacity: 0; transform: scale(0.8); }
      .cta-url { font-size: 28px; font-weight: 600; color: #1B2A4A; opacity: 0; }
      .cta-footer { font-size: 20px; color: #5D6D7E; opacity: 0; }
      .fade-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #1B2A4A; opacity: 0; z-index: 40; pointer-events: none; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      const tl = gsap.timeline({ paused: true });
      // Scene 1: Hook
      tl.to(".medical-badge", { opacity: 1, duration: 0.6 }, 0.3)
        .to(".hook-title", { scale: 1, opacity: 1, duration: 0.8, ease: "power3.out" }, 0.8)
        .to(".hook-subtitle", { opacity: 1, duration: 0.6 }, 1.6)
        .to(".red-accent-line", { width: 200, duration: 0.5, ease: "power2.out" }, 2.0)
        .to("#scene-1", { opacity: 0, duration: 0.5 }, 11.5)
        .to(".fade-overlay", { opacity: 0.3, duration: 0.15 }, 11.5)
        .to(".fade-overlay", { opacity: 0, duration: 0.15 }, 11.7);
      // Scene 2: What
      tl.set("#scene-2", { opacity: 1 }, 12.0)
        .to(".scene-label", { opacity: 1, duration: 0.5 }, 12.3)
        .to("#fact-1", { opacity: 1, y: 0, duration: 0.5, ease: "back.out(1.4)" }, 12.8)
        .to("#fact-2", { opacity: 1, y: 0, duration: 0.5, ease: "back.out(1.4)" }, 13.3)
        .to("#fact-3", { opacity: 1, y: 0, duration: 0.5, ease: "back.out(1.4)" }, 13.8)
        .to(".scene-subtitle", { opacity: 1, duration: 0.5 }, 14.5)
        .to("#scene-2", { opacity: 0, duration: 0.5 }, 23.5)
        .to(".fade-overlay", { opacity: 0.3, duration: 0.15 }, 23.5)
        .to(".fade-overlay", { opacity: 0, duration: 0.15 }, 23.7);
      // Scene 3: Mechanism
      tl.set("#scene-3", { opacity: 1 }, 24.0)
        .to("#scene-3 .scene-label", { opacity: 1, duration: 0.5 }, 24.3)
        .to("#mech-1", { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" }, 25.0)
        .to("#mech-2", { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" }, 25.6)
        .to(".mech-pulse", { scale: 2.5, opacity: 0.08, duration: 3, repeat: 3, yoyo: true, ease: "sine.inOut" }, 25.0)
        .to("#scene-3", { opacity: 0, duration: 0.5 }, 35.5)
        .to(".fade-overlay", { opacity: 0.3, duration: 0.15 }, 35.5)
        .to(".fade-overlay", { opacity: 0, duration: 0.15 }, 35.7);
      // Scene 4: Protocol
      tl.set("#scene-4", { opacity: 1 }, 36.0)
        .to("#scene-4 .scene-label", { opacity: 1, duration: 0.5 }, 36.3)
        .to(".dose-value", { opacity: 1, duration: 0.7, ease: "power3.out" }, 37.0)
        .to(".dose-unit", { opacity: 1, duration: 0.4 }, 37.5)
        .to(".dose-label", { opacity: 1, duration: 0.4 }, 37.8)
        .to("#proto-1", { opacity: 1, x: 0, duration: 0.5, ease: "power2.out" }, 38.5)
        .to("#proto-2", { opacity: 1, x: 0, duration: 0.5, ease: "power2.out" }, 39.2)
        .to("#proto-3", { opacity: 1, x: 0, duration: 0.5, ease: "power2.out" }, 39.9)
        .to(".disclaimer-text", { opacity: 1, duration: 0.8 }, 41.0)
        .to("#scene-4", { opacity: 0, duration: 0.5 }, 49.5)
        .to(".fade-overlay", { opacity: 0.3, duration: 0.15 }, 49.5)
        .to(".fade-overlay", { opacity: 0, duration: 0.15 }, 49.7);
      // Scene 5: CTA
      tl.set("#scene-5", { opacity: 1 }, 50.0)
        .to(".cta-badge", { opacity: 1, duration: 0.6 }, 50.3)
        .to(".cta-title", { opacity: 1, duration: 0.8, ease: "power2.out" }, 51.0)
        .to(".cta-action", { opacity: 1, scale: 1, duration: 0.6, ease: "back.out(1.7)" }, 52.0)
        .to(".cta-url", { opacity: 1, duration: 0.5 }, 52.8)
        .to(".cta-footer", { opacity: 1, duration: 0.5 }, 53.3);
      tl.to("#scene-5", { opacity: 0, duration: 0.8 }, 59.0);
      window.__timelines = window.__timelines || {};
      window.__timelines["main-graphics"] = tl;
    </script>
  </div>
</template>
